name: CI

# 결정적 게이트만 검증한다 — lint / 단위 테스트 / 프로덕션 빌드.
# 이미지 생성(codex)·시각 회귀는 로컬 수동(pnpm probe / pnpm test:post)이라 CI 범위 밖.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      # electron 바이너리는 CI에서 불필요(pnpm app 전용) — 다운로드 건너뛰어 install 가속.
      - run: pnpm install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - run: pnpm db:init
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
